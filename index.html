<style>
    * { box-sizing: border-box; }
    body {
        margin: 0; padding: 0;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: #0a0000;
        color: #ffffff;
        display: flex;
        flex-direction: column;
        height: 100vh;
    }
    .header {
        padding: 20px;
        text-align: center;
        background: linear-gradient(180deg, #2a0505 0%, #0a0000 100%);
        border-bottom: 2px solid #7a0000;
        box-shadow: 0 6px 18px rgba(0, 0, 0, 0.6), inset 0 -1px 0 rgba(255, 60, 60, 0.3);
    }
    .logo {
        width: 150px; height: auto; margin-bottom: 10px; border-radius: 10px;
        box-shadow: 0 4px 14px rgba(0,0,0,0.7), 0 0 12px rgba(255,30,30,0.4);
    }
    .nome-revendedor {
        font-size: 24px; font-weight: bold; color: #ff2b2b; margin: 0;
        text-transform: uppercase; letter-spacing: 2px;
        text-shadow: 0 2px 0 #4a0000, 0 4px 6px rgba(0,0,0,0.8), 0 0 18px rgba(255,0,0,0.5);
    }
    .container-painel {
        flex-grow: 1; width: 100%; position: relative; overflow: hidden;
    }
    iframe { width: 100%; height: 100%; border: none; display: block; }

    /* ---- Ícones sociais fixos no canto superior esquerdo ---- */
    .icones-sociais {
        position: fixed;
        top: 90px;
        left: 16px;
        display: flex;
        flex-direction: column;
        gap: 14px;
        z-index: 999;
    }
    .icone-social {
        width: 52px;
        height: 52px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #2a0505, #0a0000);
        border: 2px solid #ff2b2b;
        box-shadow: 0 0 14px rgba(255, 30, 30, 0.5), 0 4px 10px rgba(0,0,0,0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        text-decoration: none;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        overflow: hidden;
    }
    .icone-social:hover {
        transform: scale(1.1);
        box-shadow: 0 0 22px rgba(255, 30, 30, 0.85), 0 4px 12px rgba(0,0,0,0.7);
    }
    .icone-social img {
        width: 62%;
        height: 62%;
        object-fit: contain;
        border-radius: 6px;
    }
</style>
